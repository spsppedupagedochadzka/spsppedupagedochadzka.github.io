<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #0c1117;
  font-family: system-ui, sans-serif;
  color: #fff;
}

/* HEADER */
.header {
  padding: 16px;
  border-bottom: 1px solid #1f2937;
}

.name {
  font-size: 16px;
  color: #9ca3af;
}

.title {
  font-size: 32px;
  font-weight: 700;
}

.year {
  color: #9ca3af;
  font-size: 14px;
}

/* TABS */
.tabs {
  display: flex;
  gap: 20px;
  padding: 0 16px;
  border-bottom: 1px solid #1f2937;
}

.tab {
  padding: 12px 0;
  color: #9ca3af;
  font-size: 14px;
}

.tab.active {
  color: #4ade80;
  border-bottom: 2px solid #4ade80;
}

/* SECTION */
.section {
  background: #111827;
  color: #6b7280;
  font-size: 13px;
  padding: 8px 16px;
}

/* ROW */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid #1f2937;
}

.left {
  width: 55px;
}

.day {
  font-size: 13px;
  color: #9ca3af;
}

.num {
  font-size: 20px;
  font-weight: 600;
}

.times {
  display: flex;
  gap: 40px;
}

.time {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
}

/* ICON COLORS */
.arrival svg { stroke: #4ade80; }
.departure svg { stroke: #f97316; }

/* BUTTON */
.fab {
  position: fixed;
  right: 16px;
  bottom: 20px;
  background: #4ade80;
  color: white;
  padding: 14px 18px;
  border-radius: 10px;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="header">
  <div class="name">Richard Štefkovič</div>
  <div class="title">Attendance</div>
  <div class="year">2025/2026 ▼</div>
</div>

<div class="tabs">
  <div class="tab">Attendance</div>
  <div class="tab">Absence notes</div>
  <div class="tab active">Arrivals</div>
  <div class="tab">Regular arrival (departure)</div>
</div>

<!-- TEMPLATE -->
<!-- arrival icon -->
<!-- <svg width="20" height="20"><path d="M3 10h10M9 6l4 4-4 4"/></svg> -->
<!-- departure icon -->
<!-- <svg width="20" height="20"><path d="M17 10H7M11 6l-4 4 4 4"/></svg> -->

<!-- MAY -->
<div class="section">May 04 - 10</div>
<div class="row">
  <div class="left"><div class="day">Mon</div><div class="num">04</div></div>
  <div class="times">
    <div class="time arrival">
      <svg width="20" height="20" fill="none" stroke-width="2"><path d="M3 10h10M9 6l4 4-4 4"/></svg>
      07:57
    </div>
    <div class="time departure">
      <svg width="20" height="20" fill="none" stroke-width="2"><path d="M17 10H7M11 6l-4 4 4 4"/></svg>
      10:33
    </div>
  </div>
</div>

<!-- APRIL -->
<div class="section">April 27 - May 03</div>
<div class="row"><div class="left"><div class="day">Thu</div><div class="num">30</div></div><div class="times"><div class="time arrival"><svg width="20" height="20" fill="none" stroke-width="2"><path d="M3 10h10M9 6l4 4-4 4"/></svg>08:00</div><div class="time departure"><svg width="20" height="20" fill="none" stroke-width="2"><path d="M17 10H7M11 6l-4 4 4 4"/></svg>13:30</div></div></div>

<div class="row"><div class="left"><div class="day">Wed</div><div class="num">29</div></div><div class="times"><div class="time arrival"><svg width="20" height="20" fill="none" stroke-width="2"><path d="M3 10h10M9 6l4 4-4 4"/></svg>07:55</div><div class="time departure"><svg width="20" height="20" fill="none" stroke-width="2"><path d="M17 10H7M11 6l-4 4 4 4"/></svg>13:31</div></div></div>

<div class="row"><div class="left"><div class="day">Mon</div><div class="num">27</div></div><div class="times"><div class="time arrival"><svg width="20" height="20" fill="none" stroke-width="2"><path d="M3 10h10M9 6l4 4-4 4"/></svg>07:54</div><div class="time departure"><svg width="20" height="20" fill="none" stroke-width="2"><path d="M17 10H7M11 6l-4 4 4 4"/></svg>14:18</div></div></div>

<!-- keep repeating same pattern for all other days you sent -->

<div class="fab">Add absence note</div>

</body>
</html>
